<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Games - TableForOne</title>
  <link rel="stylesheet" href="assets/css/style.css" type="text/css">
  <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
  <header>
    <div class="header-bar">
      <div class="header-brand">
        <a href="index.html" class="header-home-link" style="display:flex;align-items:center;gap:7px;text-decoration:none;">
          <img src="assets/images/logo.png" alt="logo" class="header-logo">
          <span class="header-title">tablefor.one</span>
        </a>
      </div>
      <nav class="main-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="games.html" class="nav-link active">Games</a>
        <a href="#shop" class="nav-link crossed" tabindex="-1">Shop</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
    </div>
  </header>
  <main style="--target-opacity: 1;">
    <section class="games-section" id="games">
      <h2>My Games</h2>
      <div class="game-list">
        <div class="game-card">
          <img src="assets/images/Climbbound/banner.webp" alt="Idle Mountain Climber banner" style="width:100%;max-width:552px;border-radius:12px;box-shadow:0 4px 16px #0007;margin-bottom:18px;">
          <div class="game-info">
            <h3>Climbbound - Idle Mountain Climber</h3>
            <a href="https://liam-223.itch.io/idle-mountain-climber" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;padding:10px 22px;background:#5204aa;color:#fff;border-radius:8px;font-weight:600;text-decoration:none;transition:background 0.2s;">Play on itch.io</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer style="width:100vw;text-align:center;padding:18px 0 12px 0;font-size:0.8rem;color:#aaa;background:none;letter-spacing:0.01em;">
    &copy; 2026 Liam. All rights reserved.
  </footer>
</body>
</html>
